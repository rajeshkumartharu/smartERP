<form method="post">
    {% csrf_token %}

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <div class="mb-3">
        <label>Current Password</label>
        <input type="password"
               name="current_password"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>New Password</label>
        <input type="password"
               name="new_password"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Confirm Password</label>
        <input type="password"
               name="confirm_password"
               class="form-control"
               required>
    </div>

    <button type="submit" class="btn btn-primary">
        Change Password
    </button>
</form>
