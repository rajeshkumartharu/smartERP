{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SmartSchool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-green-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md relative">

    <!-- Logo -->
    <div class="text-center mb-6">
        <img src="{% static 'images/logo.png' %}" class="mx-auto w-20 mb-2">
        <h2 class="text-2xl font-bold text-gray-700">Welcome <span class="text-green-500">Back!</span></h2>
        <p class="text-gray-400 text-sm">Sign in to continue</p>
    </div>

    <!-- Form -->
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 p-3 rounded-lg text-sm font-medium
          {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
          {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
          {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="text-sm text-gray-600">Username or Email</label>
            <input type="text" name="username" value="{{ identifier|default:'' }}"
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                placeholder="Enter your username or email">
        </div>

        <div class="mb-4">
            <label class="text-sm text-gray-600">Password</label>
            <input type="password" name="password"
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
                placeholder="Enter your password">
        </div>

        <div class="flex justify-between text-sm mb-6">
            <a href="{% url 'change_password' %}" class="text-blue-500 hover:underline">Change Password</a>
            <a href="#" class="text-blue-500 hover:underline">Forgot Password?</a>
        </div>

        <button type="submit"
            class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-600 to-green-500 text-white font-semibold shadow-lg hover:scale-105 transition">
            Login →
        </button>

    </form>
</div>

</body>
</html>
